  <script>
    
document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

 align-items: center; justify-content: space-between;\n    padding: 0 2.5rem;\n    height: 60px;\n    background: rgba(12,14,13,0.85);\n    backdrop-filter: blur(16px);\n    border-bottom: 1px solid var(--border);\n  }\n  .nav-logo {\n    font-weight: 700; font-size: 1rem; letter-spacing: -0.02em;\n    color: var(--text); text-decoration: none;\n  }\n  .nav-logo span { color: var(--accent); }\n  .nav-links { display: flex; gap: 2rem; list-style: none; }\n  .nav-links a {\n    color: var(--muted); text-decoration: none; font-size: 0.85rem;\n    font-weight: 500; letter-spacing: 0.01em;\n    transition: color 0.2s;\n  }\n  .nav-links a:hover { color: var(--text); }\n\n  /* ─── HERO ─── */\n  #hero {\n    min-height: 100vh;\n    display: grid;\n    grid-template-columns: 1fr 1fr;\n    gap: 0;\n    padding-top: 60px;\n  }\n  .hero-left {\n    display: flex; flex-direction: column; justify-content: center;\n    padding: 6rem 4rem 6rem 6rem;\n  }\n  .hero-tag {\n    display: inline-flex; align-items: center; gap: 8px;\n    background: rgba(255,255,255,0.05);\n    border: 1px solid var(--border);\n    border-radius: 99px;\n    padding: 6px 14px;\n    font-size: 0.75rem; font-weight: 600; letter-spacing: 0.06em;\n    text-transform: uppercase; color: var(--accent);\n    margin-bottom: 2rem;\n    width: fit-content;\n  }\n  .hero-tag::before {\n    content: '';\n    width: 7px; height: 7px; border-radius: 50%;\n    background: var(--accent);\n    animation: pulse 2s ease-in-out infinite;\n  }\n  @keyframes pulse {\n    0%, 100% { opacity: 1; transform: scale(1); }\n    50% { opacity: 0.4; transform: scale(0.8); }\n  }\n  h1 {\n    font-size: clamp(2.8rem, 5vw, 4.2rem);\n    font-weight: 800;\n    letter-spacing: -0.04em;\n    line-height: 1.05;\n    color: var(--text);\n    margin-bottom: 1rem;\n  }\n  h1 em { font-style: normal; color: var(--accent); }\n  .hero-subtitle {\n    font-size: 1.05rem; color: var(--muted); font-weight: 400;\n    max-width: 440px; line-height: 1.7;\n    margin-bottom: 2.5rem;\n  }\n  .hero-stats {\n    display: flex; gap: 2.5rem; margin-bottom: 2.5rem;\n  }\n  .stat-item { display: flex; flex-direction: column; }\n  .stat-num {\n    font-size: 1.8rem; font-weight: 800; letter-spacing: -0.04em;\n    color: var(--text);\n  }\n  .stat-label { font-size: 0.75rem; color: var(--muted); font-weight: 500; }\n  .hero-actions { display: flex; gap: 1rem; flex-wrap: wrap; }\n  .btn {\n    display: inline-flex; align-items: center; gap: 8px;\n    padding: 12px 24px; border-radius: 99px;\n    font-family: var(--font); font-size: 0.85rem; font-weight: 600;\n    cursor: pointer; transition: all 0.2s; text-decoration: none;\n    border: none;\n  }\n  .btn-primary {\n    background: var(--accent); color: #000;\n  }\n  .btn-primary:hover { filter: brightness(1.12); transform: translateY(-1px); }\n  .btn-ghost {\n    background: transparent; color: var(--text);\n    border: 1px solid var(--border);\n  }\n  .btn-ghost:hover { background: var(--bg3); transform: translateY(-1px); }\n\n  .hero-right {\n    position: relative; display: flex; align-items: center; justify-content: center;\n    background: var(--bg2);\n    border-left: 1px solid var(--border);\n    overflow: hidden;\n  }\n  .hero-img-wrap {\n    position: relative; z-index: 2;\n    width: 280px; height: 280px; border-radius: 50%;\n    overflow: hidden;\n    border: 3px solid rgba(255,255,255,0.08);\n    box-shadow: 0 0 80px oklch(68% 0.18 48 / 0.2);\n  }\n  .hero-img-wrap img { width: 100%; height: 100%; object-fit: cover; }\n  .hero-img-placeholder {\n    width: 100%; height: 100%;\n    background: var(--bg3);\n    display: flex; align-items: center; justify-content: center;\n    color: var(--muted); font-size: 5rem; font-weight: 800;\n    letter-spacing: -0.05em;\n  }\n  .hero-bg-glow {\n    position: absolute; width: 400px; height: 400px; border-radius: 50%;\n    background: oklch(68% 0.18 48 / 0.08);\n    filter: blur(80px);\n  }\n\n  /* ─── SECTIONS ─── */\n  section { padding: 5rem 6rem; }\n  section + section { border-top: 1px solid var(--border); }\n  .section-label {\n    font-size: 0.7rem; font-weight: 700; letter-spacing: 0.1em;\n    text-transform: uppercase; color: var(--accent);\n    margin-bottom: 0.75rem;\n  }\n  h2 {\n    font-size: 2rem; font-weight: 800; letter-spacing: -0.03em;\n    color: var(--text); margin-bottom: 0.5rem;\n  }\n  .section-intro {\n    color: var(--muted); font-size: 0.95rem; max-width: 560px;\n    margin-bottom: 3rem; line-height: 1.7;\n  }\n\n  /* ─── ABOUT GRID ─── */\n  .about-grid {\n    display: grid; grid-template-columns: 2fr 1fr;\n    gap: 2rem;\n  }\n  .about-bio {\n    background: var(--bg2); border: 1px solid var(--border);\n    border-radius: var(--r); padding: 2rem;\n  }\n  .about-bio p {\n    color: var(--muted); line-height: 1.8; font-size: 0.95rem;\n    text-wrap: pretty;\n  }\n  .about-details {\n    display: flex; flex-direction: column; gap: 1rem;\n  }\n  .detail-card {\n    background: var(--bg2); border: 1px solid var(--border);\n    border-radius: var(--r); padding: 1.25rem 1.5rem;\n  }\n  .detail-card dt {\n    font-size: 0.7rem; font-weight: 700; letter-spacing: 0.08em;\n    text-transform: uppercase; color: var(--muted); margin-bottom: 4px;\n  }\n  .detail-card dd {\n    font-size: 0.95rem; font-weight: 600; color: var(--text);\n  }\n\n  /* ─── EXPERIENCE ─── */\n  .timeline { display: flex; flex-direction: column; gap: 0; }\n  .timeline-item {\n    display: grid; grid-template-columns: 180px 1fr;\n    gap: 2rem; padding: 2rem 0;\n    border-bottom: 1px solid var(--border);\n    position: relative;\n  }\n  .timeline-item:last-child { border-bottom: none; }\n  .tl-period {\n    font-size: 0.78rem; color: var(--muted); font-weight: 500;\n    padding-top: 4px; text-align: right;\n  }\n  .tl-dot {\n    position: absolute; left: 180px; top: 30px;\n    width: 10px; height: 10px; border-radius: 50%;\n    background: var(--bg3); border: 2px solid var(--border);\n    transform: translateX(-50%);\n    z-index: 1;\n  }\n  .timeline-item.current .tl-dot {\n    background: var(--accent); border-color: var(--accent);\n    box-shadow: 0 0 12px var(--accent);\n  }\n  .tl-line {\n    position: absolute; left: 180px; top: 40px; bottom: -1px;\n    width: 1px; background: var(--border);\n    transform: translateX(-50%);\n  }\n  .timeline-item:last-child .tl-line { display: none; }\n  .tl-content { padding-left: 1.5rem; }\n  .tl-org {\n    font-size: 0.78rem; font-weight: 600; letter-spacing: 0.04em;\n    color: var(--accent); text-transform: uppercase; margin-bottom: 4px;\n  }\n  .tl-role {\n    font-size: 1.05rem; font-weight: 700; color: var(--text);\n    letter-spacing: -0.02em; margin-bottom: 0.5rem;\n  }\n  .tl-desc { color: var(--muted); font-size: 0.88rem; line-height: 1.7; }\n  .tl-tags { display: flex; flex-wrap: wrap; gap: 6px; margin-top: 0.75rem; }\n  .tag {\n    font-size: 0.7rem; font-weight: 600; letter-spacing: 0.03em;\n    padding: 3px 10px; border-radius: 99px;\n    background: rgba(255,255,255,0.05); color: var(--muted);\n    border: 1px solid var(--border);\n  }\n\n  /* ─── SKILLS ─── */\n  .skills-grid {\n    display: grid; grid-template-columns: repeat(3, 1fr); gap: 1.5rem;\n  }\n  .skill-group {\n    background: var(--bg2); border: 1px solid var(--border);\n    border-radius: var(--r); padding: 1.5rem;\n  }\n  .skill-group h3 {\n    font-size: 0.78rem; font-weight: 700; letter-spacing: 0.07em;\n    text-transform: uppercase; color: var(--accent); margin-bottom: 1rem;\n  }\n  .skill-list { list-style: none; display: flex; flex-wrap: wrap; gap: 6px; }\n  .skill-list li {\n    font-size: 0.78rem; font-weight: 500; padding: 4px 11px;\n    border-radius: 6px; background: var(--bg3);\n    border: 1px solid var(--border); color: var(--muted);\n    transition: all 0.15s;\n  }\n  .skill-list li:hover { color: var(--text); border-color: rgba(255,255,255,0.15); }\n\n  /* ─── EDUCATION ─── */\n  .edu-grid {\n    display: grid; grid-template-columns: repeat(3, 1fr); gap: 1.5rem;\n  }\n  .edu-card {\n    background: var(--bg2); border: 1px solid var(--border);\n    border-radius: var(--r); padding: 1.75rem;\n    transition: border-color 0.2s;\n  }\n  .edu-card:hover { border-color: rgba(255,255,255,0.15); }\n  .edu-degree {\n    font-size: 0.75rem; font-weight: 700; letter-spacing: 0.06em;\n    text-transform: uppercase; color: var(--accent); margin-bottom: 0.5rem;\n  }\n  .edu-title {\n    font-size: 1rem; font-weight: 700; color: var(--text);\n    letter-spacing: -0.02em; margin-bottom: 0.25rem; line-height: 1.3;\n  }\n  .edu-institution {\n    font-size: 0.82rem; color: var(--muted); margin-bottom: 0.75rem;\n  }\n  .edu-period {\n    font-size: 0.72rem; color: var(--muted); opacity: 0.7; font-weight: 500;\n  }\n\n  /* ─── PROJECTS ─── */\n  .projects-grid {\n    display: grid; grid-template-columns: repeat(2, 1fr); gap: 1.5rem;\n  }\n  .project-card {\n    background: var(--bg2); border: 1px solid var(--border);\n    border-radius: var(--r); padding: 1.75rem;\n    display: flex; flex-direction: column; gap: 0.75rem;\n    transition: all 0.2s; text-decoration: none;\n  }\n  .project-card:hover {\n    border-color: rgba(255,255,255,0.15);\n    transform: translateY(-2px);\n  }\n  .project-title {\n    font-size: 1rem; font-weight: 700; color: var(--text); letter-spacing: -0.02em;\n  }\n  .project-desc { font-size: 0.85rem; color: var(--muted); line-height: 1.6; }\n  .project-link {\n    font-size: 0.75rem; font-weight: 600; color: var(--accent);\n    display: flex; align-items: center; gap: 5px; margin-top: auto;\n  }\n  .project-link::after { content: '↗'; font-size: 0.9rem; }\n\n  /* ─── CONTACT ─── */\n  #contact {\n    background: var(--bg2);\n  }\n  .contact-grid {\n    display: grid; grid-template-columns: 1fr 1fr; gap: 3rem;\n    align-items: start;\n  }\n  .contact-links { display: flex; flex-direction: column; gap: 1rem; }\n  .contact-link {\n    display: flex; align-items: center; gap: 14px;\n    background: var(--bg3); border: 1px solid var(--border);\n    border-radius: var(--r); padding: 1.1rem 1.25rem;\n    text-decoration: none; color: var(--text);\n    transition: all 0.2s;\n  }\n  .contact-link:hover { border-color: rgba(255,255,255,0.15); transform: translateX(4px); }\n  .contact-icon {\n    width: 38px; height: 38px; border-radius: 8px;\n    background: rgba(255,255,255,0.05);\n    display: flex; align-items: center; justify-content: center;\n    font-size: 1rem; flex-shrink: 0;\n  }\n  .contact-label { font-size: 0.78rem; color: var(--muted); font-weight: 500; }\n  .contact-value { font-size: 0.9rem; font-weight: 600; }\n\n  /* ─── FOOTER ─── */\n  footer {\n    padding: 2rem 6rem;\n    border-top: 1px solid var(--border);\n    display: flex; align-items: center; justify-content: space-between;\n    color: var(--muted); font-size: 0.78rem;\n  }\n\n  /* ─── SCROLLBAR ─── */\n  ::-webkit-scrollbar { width: 4px; }\n  ::-webkit-scrollbar-track { background: var(--bg); }\n  ::-webkit-scrollbar-thumb { background: var(--bg3); border-radius: 99px; }\n\n  /* ─── RESPONSIVE ─── */\n  @media (max-width: 900px) {\n    #hero { grid-template-columns: 1fr; }\n    .hero-left { padding: 4rem 2rem; }\n    .hero-right { min-height: 300px; }\n    section { padding: 3.5rem 2rem; }\n    .about-grid, .skills-grid, .edu-grid, .projects-grid,\n    .contact-grid { grid-template-columns: 1fr; }\n    .timeline-item { grid-template-columns: 1fr; }\n    .tl-period { text-align: left; }\n    .tl-dot, .tl-line { display: none; }\n    .tl-content { padding-left: 0; }\n    nav { padding: 0 1.25rem; }\n    .nav-links { display: none; }\n    footer { padding: 1.5rem 2rem; flex-direction: column; gap: 0.5rem; text-align: center; }\n  }\n<\u002Fstyle>\n<\u002Fhead>\n<body>\n\n<!-- NAV -->\n<nav>\n  <a href=\"#hero\" class=\"nav-logo\">René<span>.<\u002Fspan><\u002Fa>\n  <ul class=\"nav-links\">\n    <li><a href=\"#about\">Perfil<\u002Fa><\u002Fli>\n    <li><a href=\"#experience\">Experiencia<\u002Fa><\u002Fli>\n    <li><a href=\"#education\">Educación<\u002Fa><\u002Fli>\n    <li><a href=\"#skills\">Habilidades<\u002Fa><\u002Fli>\n    <li><a href=\"#projects\">Proyectos<\u002Fa><\u002Fli>\n    <li><a href=\"#contact\">Contacto<\u002Fa><\u002Fli>\n  <\u002Ful>\n<\u002Fnav>\n\n<!-- HERO -->\n<section id=\"hero\">\n  <div class=\"hero-left\">\n    <div class=\"hero-tag\">Disponible para colaborar<\u002Fdiv>\n    <h1>René<br><em>Cruz<\u002Fem><br>Flores<\u002Fh1>\n    <p class=\"hero-subtitle\">\n      Solution Architect · Product Manager · Desarrollador · Investigador.\n      Más de 25 años transformando ideas en soluciones tecnológicas.\n    <\u002Fp>\n    <div class=\"hero-stats\">\n      <div class=\"stat-item\">\n        <span class=\"stat-num\" id=\"age-stat\">—<\u002Fspan>\n        <span class=\"stat-label\">Años<\u002Fspan>\n      <\u002Fdiv>\n      <div class=\"stat-item\">\n        <span class=\"stat-num\">25+<\u002Fspan>\n        <span class=\"stat-label\">Años de experiencia<\u002Fspan>\n      <\u002Fdiv>\n      <div class=\"stat-item\">\n        <span class=\"stat-num\">PhD<\u002Fspan>\n        <span class=\"stat-label\">Doctorado<\u002Fspan>\n      <\u002Fdiv>\n    <\u002Fdiv>\n    <div class=\"hero-actions\">\n      <a href=\"#contact\" class=\"btn btn-primary\">Contactar →<\u002Fa>\n      <a href=\"https://www.linkedin.com/in/renecruzflores/\" target=\"_blank\" class=\"btn btn-ghost\">LinkedIn ↗<\u002Fa>\n    <\u002Fdiv>\n  <\u002Fdiv>\n\n  <div class=\"hero-right\">\n    <div class=\"hero-bg-glow\"><\u002Fdiv>\n    <div class=\"hero-img-wrap\">\n      <img src=\"a6240712-9e86-4276-94d6-03dccb5d2b5a\" id=\"profile-photo\" alt=\"René Cruz Flores\" onerror=\"this.style.display='none';this.nextElementSibling.style.display='flex'\">\n      <div class=\"hero-img-placeholder\" style=\"display:none\">RC<\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<!-- ABOUT -->\n<section id=\"about\">\n  <div class=\"section-label\">Acerca de mí<\u002Fdiv>\n  <h2>Tecnólogo apasionado<br>con visión estratégica<\u002Fh2>\n  <p class=\"section-intro\">\n    Consultor y líder técnico con trayectoria en Fintech, academia e investigación aplicada.\n  <\u002Fp>\n  <div class=\"about-grid\">\n    <div class=\"about-bio\">\n      <p>\n        Soy Solution Architect, Product Manager, Desarrollador, Investigador y Consultor en el área de Tecnologías Emergentes. En los últimos años he colaborado en el campo Fintech como responsable del Identity and Access Management, y actualmente lidero iniciativas tecnológicas en IDS IT Comercial.<br><br>\n        He realizado y coordinado proyectos de I+D+i con financiamiento de fuentes privadas y de gobierno durante más de 10 años, y cuento con un perfil tecnólogo y de desarrollo de software con más de 25 años en la industria. Soy Doctor en Tecnología Educativa y Maestro en Ciencias de la Computación, con especialidad en Sistemas Distribuidos.\n      <\u002Fp>\n    <\u002Fdiv>\n    <div class=\"about-details\">\n      <dl class=\"detail-card\">\n        <dt>Nombre completo<\u002Fdt>\n        <dd>René Gpe. Cruz Flores<\u002Fdd>\n      <\u002Fdl>\n      <dl class=\"detail-card\">\n        <dt>Edad<\u002Fdt>\n        <dd id=\"age-detail\">—<\u002Fdd>\n      <\u002Fdl>\n      <dl class=\"detail-card\">\n        <dt>Ubicación<\u002Fdt>\n        <dd>Chalco, México<\u002Fdd>\n      <\u002Fdl>\n      <dl class=\"detail-card\">\n        <dt>Idiomas<\u002Fdt>\n        <dd>Español · Inglés<\u002Fdd>\n      <\u002Fdl>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<!-- EXPERIENCE -->\n<section id=\"experience\">\n  <div class=\"section-label\">Trayectoria profesional<\u002Fdiv>\n  <h2>Experiencia<\u002Fh2>\n  <p class=\"section-intro\">Carrera construida en la intersección de tecnología, producto y academia.<\u002Fp>\n\n  <div class=\"timeline\">\n\n    <div class=\"timeline-item current\">\n      <div class=\"tl-dot\"><\u002Fdiv>\n      <div class=\"tl-line\"><\u002Fdiv>\n      <div class=\"tl-period\">2023 — Presente<\u002Fdiv>\n      <div class=\"tl-content\">\n        <div class=\"tl-org\">IDS IT Comercial<\u002Fdiv>\n        <div class=\"tl-role\">Solution Architect / Consultor Tecnológico<\u002Fdiv>\n        <div class=\"tl-desc\">\n          Liderazgo de iniciativas de arquitectura de soluciones y consultoría tecnológica para clientes enterprise. Diseño e implementación de estrategias de transformación digital, integración de sistemas y gestión de proyectos de software de alta complejidad.\n        <\u002Fdiv>\n        <div class=\"tl-tags\">\n          <span class=\"tag\">Solution Architecture<\u002Fspan>\n          <span class=\"tag\">Digital Transformation<\u002Fspan>\n          <span class=\"tag\">Consultoría<\u002Fspan>\n          <span class=\"tag\">Enterprise<\u002Fspan>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n\n    <div class=\"timeline-item\">\n      <div class=\"tl-dot\"><\u002Fdiv>\n      <div class=\"tl-line\"><\u002Fdiv>\n      <div class=\"tl-period\">Nov 2021 — Mar 2023<\u002Fdiv>\n      <div class=\"tl-content\">\n        <div class=\"tl-org\">Kueski<\u002Fdiv>\n        <div class=\"tl-role\">Sr. Product Manager<\u002Fdiv>\n        <div class=\"tl-desc\">\n          Responsable de Identity &amp; Access Management (IAM) utilizando Okta, Auth0 y Veriff. Diseño de plataforma Feature Flag (LaunchDarkly, Harness, Split.io), motor de búsqueda de productos con Elastic Search, y sistema de gestión de APIs con Datadog y Kong API Gateway.\n        <\u002Fdiv>\n        <div class=\"tl-tags\">\n          <span class=\"tag\">IAM<\u002Fspan><span class=\"tag\">Okta / Auth0<\u002Fspan>\n          <span class=\"tag\">ElasticSearch<\u002Fspan><span class=\"tag\">API Management<\u002Fspan>\n          <span class=\"tag\">Fintech<\u002Fspan>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n\n    <div class=\"timeline-item\">\n      <div class=\"tl-dot\"><\u002Fdiv>\n      <div class=\"tl-line\"><\u002Fdiv>\n      <div class=\"tl-period\">Jun 2016 — Mar 2021<\u002Fdiv>\n      <div class=\"tl-content\">\n        <div class=\"tl-org\">UAEMex<\u002Fdiv>\n        <div class=\"tl-role\">Director — CU Valle de Chalco<\u002Fdiv>\n        <div class=\"tl-desc\">\n          Cargo directivo en la Universidad Autónoma del Estado de México. Consolidé la agenda académica y de I+D+i del campus, gestionando proyectos vinculados con la industria y el sector gubernamental.\n        <\u002Fdiv>\n        <div class=\"tl-tags\">\n          <span class=\"tag\">Dirección académica<\u002Fspan>\n          <span class=\"tag\">I+D+i<\u002Fspan><span class=\"tag\">Gestión universitaria<\u002Fspan>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n\n    <div class=\"timeline-item\">\n      <div class=\"tl-dot\"><\u002Fdiv>\n      <div class=\"tl-line\"><\u002Fdiv>\n      <div class=\"tl-period\">Ago 2011 — May 2016<\u002Fdiv>\n      <div class=\"tl-content\">\n        <div class=\"tl-org\">UAEMex<\u002Fdiv>\n        <div class=\"tl-role\">Coordinador de Investigación y Estudios Avanzados<\u002Fdiv>\n        <div class=\"tl-desc\">\n          Organización del grupo de investigadores miembros del SNI para fortalecer las líneas de generación y aplicación del conocimiento. Coordinación de proyectos de ciencia básica y aplicada con financiamiento externo.\n        <\u002Fdiv>\n        <div class=\"tl-tags\">\n          <span class=\"tag\">Investigación<\u002Fspan><span class=\"tag\">SNI<\u002Fspan>\n          <span class=\"tag\">Ciencia Aplicada<\u002Fspan>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n\n  <\u002Fdiv>\n<\u002Fsection>\n\n<!-- EDUCATION -->\n<section id=\"education\">\n  <div class=\"section-label\">Formación académica<\u002Fdiv>\n  <h2>Educación<\u002Fh2>\n  <div class=\"edu-grid\">\n    <div class=\"edu-card\">\n      <div class=\"edu-degree\">Doctorado<\u002Fdiv>\n      <div class=\"edu-title\">Ciencias — Tecnología Educativa<\u002Fdiv>\n      <div class=\"edu-institution\">Universidad Autónoma de Baja California<\u002Fdiv>\n      <div class=\"edu-period\">Ene 2007 – Dic 2010<\u002Fdiv>\n    <\u002Fdiv>\n    <div class=\"edu-card\">\n      <div class=\"edu-degree\">Maestría<\u002Fdiv>\n      <div class=\"edu-title\">Ciencias de la Computación — Sistemas Distribuidos<\u002Fdiv>\n      <div class=\"edu-institution\">Fundación Arturo Rosenblueth<\u002Fdiv>\n      <div class=\"edu-period\">Sep 2002 – Nov 2004<\u002Fdiv>\n    <\u002Fdiv>\n    <div class=\"edu-card\">\n      <div class=\"edu-degree\">Ingeniería<\u002Fdiv>\n      <div class=\"edu-title\">Ingeniería en Computación — Desarrollo de Software<\u002Fdiv>\n      <div class=\"edu-institution\">Universidad Autónoma del Estado de México<\u002Fdiv>\n      <div class=\"edu-period\">Sep 1996 – Ago 2001<\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<!-- SKILLS -->\n<section id=\"skills\">\n  <div class=\"section-label\">Competencias<\u002Fdiv>\n  <h2>Habilidades<\u002Fh2>\n  <div class=\"skills-grid\">\n    <div class=\"skill-group\">\n      <h3>Producto &amp; Arquitectura<\u002Fh3>\n      <ul class=\"skill-list\">\n        <li>Product Management<\u002Fli><li>Solution Architecture<\u002Fli>\n        <li>Scrum / Agile<\u002Fli><li>UML<\u002Fli><li>Feature Flags<\u002Fli>\n        <li>API Management<\u002Fli><li>IAM / SSO<\u002Fli>\n        <li>ElasticSearch<\u002Fli><li>Kong<\u002Fli><li>Datadog<\u002Fli>\n      <\u002Ful>\n    <\u002Fdiv>\n    <div class=\"skill-group\">\n      <h3>Desarrollo<\u002Fh3>\n      <ul class=\"skill-list\">\n        <li>JavaScript<\u002Fli><li>PHP / Laravel<\u002Fli><li>Java<\u002Fli>\n        <li>Ruby<\u002Fli><li>Swift<\u002Fli><li>HTML5<\u002Fli>\n        <li>CSS3 / SASS<\u002Fli><li>MySQL<\u002Fli>\n        <li>AngularJS<\u002Fli><li>jQuery<\u002Fli><li>JSON / XML<\u002Fli>\n      <\u002Ful>\n    <\u002Fdiv>\n    <div class=\"skill-group\">\n      <h3>Herramientas<\u002Fh3>\n      <ul class=\"skill-list\">\n        <li>Jira / Confluence<\u002Fli><li>Figma<\u002Fli>\n        <li>Git / Git Flow<\u002Fli><li>VS Code<\u002Fli>\n        <li>Notion<\u002Fli><li>AWS<\u002Fli>\n        <li>Google Suite<\u002Fli><li>Trello<\u002Fli>\n        <li>Slack<\u002Fli><li>Adobe Photoshop<\u002Fli>\n        <li>Adobe Lightroom<\u002Fli>\n      <\u002Ful>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<!-- PROJECTS -->\n<section id=\"projects\">\n  <div class=\"section-label\">Iniciativas<\u002Fdiv>\n  <h2>Proyectos<\u002Fh2>\n  <div class=\"projects-grid\">\n    <a href=\"https://www.youtube.com/channel/UCrnqFuyyqk2-ky8cl1M9XMQ\" target=\"_blank\" class=\"project-card\">\n      <div class=\"project-title\">Coding the Life<\u002Fdiv>\n      <div class=\"project-desc\">Canal de YouTube dedicado a la enseñanza de la programación. Tutoriales de Java, Python y C++ para todos los niveles.<\u002Fdiv>\n      <div class=\"tl-tags\">\n        <span class=\"tag\">YouTube<\u002Fspan><span class=\"tag\">Programación<\u002Fspan>\n        <span class=\"tag\">Java<\u002Fspan><span class=\"tag\">Python<\u002Fspan><span class=\"tag\">C++<\u002Fspan>\n      <\u002Fdiv>\n      <div class=\"project-link\">Ver canal<\u002Fdiv>\n    <\u002Fa>\n    <a href=\"https://www.youtube.com/channel/UCT_gkmcLEYkOPHUWuHgYuBA\" target=\"_blank\" class=\"project-card\">\n      <div class=\"project-title\">Laboratorio de TE — UAEMex<\u002Fdiv>\n      <div class=\"project-desc\">Canal académico para mostrar proyectos de alumnos de Tecnología Educativa. Tecnología, educación y programación en práctica.<\u002Fdiv>\n      <div class=\"tl-tags\">\n        <span class=\"tag\">Educación<\u002Fspan><span class=\"tag\">UAEMex<\u002Fspan><span class=\"tag\">YouTube<\u002Fspan>\n      <\u002Fdiv>\n      <div class=\"project-link\">Ver canal<\u002Fdiv>\n    <\u002Fa>\n    <a href=\"http://remiam.org\" target=\"_blank\" class=\"project-card\">\n      <div class=\"project-title\">ReMIAM<\u002Fdiv>\n      <div class=\"project-desc\">Red Mexicana de Investigadores en Aprendizaje Móvil. Comunidad enfocada en investigación sobre aprendizaje con dispositivos móviles.<\u002Fdiv>\n      <div class=\"tl-tags\">\n        <span class=\"tag\">Investigación<\u002Fspan><span class=\"tag\">Mobile Learning<\u002Fspan>\n      <\u002Fdiv>\n      <div class=\"project-link\">Visitar sitio<\u002Fdiv>\n    <\u002Fa>\n    <a href=\"http://remitee.org\" target=\"_blank\" class=\"project-card\">\n      <div class=\"project-title\">ReMITEE, A.C.<\u002Fdiv>\n      <div class=\"project-desc\">Red Mexicana de Investigadores en Tecnologías Emergentes para la Educación. Organización civil para la innovación educativa.<\u002Fdiv>\n      <div class=\"tl-tags\">\n        <span class=\"tag\">Investigación<\u002Fspan><span class=\"tag\">Tecnologías Emergentes<\u002Fspan>\n      <\u002Fdiv>\n      <div class=\"project-link\">Visitar sitio<\u002Fdiv>\n    <\u002Fa>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<!-- CONTACT -->\n<section id=\"contact\">\n  <div class=\"section-label\">Contacto<\u002Fdiv>\n  <h2>Hablemos<\u002Fh2>\n  <p class=\"section-intro\">\n    ¿Tienes un proyecto o colaboración en mente? Estoy disponible para nuevas oportunidades.\n  <\u002Fp>\n  <div class=\"contact-grid\">\n    <div class=\"contact-links\">\n      <a href=\"mailto:renecruzflores1@gmail.com\" class=\"contact-link\">\n        <div class=\"contact-icon\">✉<\u002Fdiv>\n        <div>\n          <div class=\"contact-label\">Email<\u002Fdiv>\n          <div class=\"contact-value\">renecruzflores1@gmail.com<\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fa>\n      <a href=\"https://www.linkedin.com/in/renecruzflores/\" target=\"_blank\" class=\"contact-link\">\n        <div class=\"contact-icon\">in<\u002Fdiv>\n        <div>\n          <div class=\"contact-label\">LinkedIn<\u002Fdiv>\n          <div class=\"contact-value\">linkedin.com/in/renecruzflores<\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fa>\n      <a href=\"https://twitter.com/renecruzflores\" target=\"_blank\" class=\"contact-link\">\n        <div class=\"contact-icon\">𝕏<\u002Fdiv>\n        <div>\n          <div class=\"contact-label\">X (Twitter)<\u002Fdiv>\n          <div class=\"contact-value\">@renecruzflores<\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fa>\n      <a href=\"https://github.com/renecruz\" target=\"_blank\" class=\"contact-link\">\n        <div class=\"contact-icon\">&lt;/&gt;<\u002Fdiv>\n        <div>\n          <div class=\"contact-label\">GitHub<\u002Fdiv>\n          <div class=\"contact-value\">github.com/renecruz<\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fa>\n    <\u002Fdiv>\n    <div>\n      <div class=\"detail-card\" style=\"margin-bottom:1rem\">\n        <dt>Empresa actual<\u002Fdt>\n        <dd style=\"margin-top:4px\">IDS IT Comercial<\u002Fdd>\n      <\u002Fdiv>\n      <div class=\"detail-card\">\n        <dt>Rol<\u002Fdt>\n        <dd style=\"margin-top:4px\">Solution Architect / Consultor<\u002Fdd>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<!-- FOOTER -->\n<footer>\n  <span>© <span id=\"year\"><\u002Fspan> René Cruz Flores — Chalco, México<\u002Fspan>\n  <span>Hecho con HTML · CSS · JS<\u002Fspan>\n<\u002Ffooter>\n\n<script>\n  // ─── INLINE RESOURCE: profile photo ───\n  if (window.__resources && window.__resources.profilePhoto) {\n    const img = document.getElementById('profile-photo');\n    if (img) img.src = window.__resources.profilePhoto;\n  }\n\n  // ─── AUTO-UPDATING AGE ───\n  function calcAge(birthYear, birthMonth, birthDay) {\n    const today = new Date();\n    let age = today.getFullYear() - birthYear;\n    const m = today.getMonth() + 1;\n    if (m < birthMonth || (m === birthMonth && today.getDate() < birthDay)) age--;\n    return age;\n  }\n  const age = calcAge(1975, 6, 20);\n  document.getElementById('age-stat').textContent = age;\n  document.getElementById('age-detail').textContent = age + ' años';\n  document.getElementById('year').textContent = new Date().getFullYear();\n\n  // ─── TWEAKS ───\n  const TWEAK_DEFAULTS = /*EDITMODE-BEGIN*/{\n    \"accentColor\": \"oklch(68% 0.18 48)\",\n    \"darkMode\": true,\n    \"fontSize\": 15\n  }/*EDITMODE-END*/;\n\n  let tweakState = { ...TWEAK_DEFAULTS };\n\n  function applyTweaks(s) {\n    document.documentElement.style.setProperty('--accent', s.accentColor);\n    document.documentElement.style.setProperty('--font-size', s.fontSize + 'px');\n    document.body.style.fontSize = s.fontSize + 'px';\n  }\n  applyTweaks(tweakState);\n\n  // Tweaks panel\n  const panel = document.createElement('div');\n  panel.id = 'tweaks-panel';\n  panel.style.cssText = `\n    display:none; position:fixed; bottom:1.5rem; right:1.5rem; z-index:9999;\n    background:#1c201e; border:1px solid rgba(255,255,255,0.1); border-radius:14px;\n    padding:1.25rem 1.5rem; width:260px; color:#f0ece4;\n    font-family:'Plus Jakarta Sans',sans-serif; font-size:13px;\n    box-shadow: 0 8px 32px rgba(0,0,0,0.5);\n  `;\n  panel.innerHTML = `\n    <div style=\"font-weight:700;margin-bottom:1rem;letter-spacing:-0.01em\">Tweaks<\u002Fdiv>\n    <label style=\"display:block;margin-bottom:.75rem\">\n      <span style=\"color:#8a9690;font-size:.75rem;display:block;margin-bottom:4px\">Color de acento<\u002Fspan>\n      <div style=\"display:flex;gap:8px;flex-wrap:wrap\">\n        ${[\n          ['Ámbar', 'oklch(68% 0.18 48)'],\n          ['Verde', 'oklch(68% 0.18 155)'],\n          ['Azul', 'oklch(68% 0.18 240)'],\n          ['Rosa', 'oklch(68% 0.18 350)'],\n        ].map(([name, val]) => `\n          <button onclick=\"setAccent('${val}')\" title=\"${name}\"\n            style=\"width:26px;height:26px;border-radius:50%;border:2px solid transparent;\n            cursor:pointer;background:${val};transition:transform .15s\"\n            onmouseover=\"this.style.transform='scale(1.15)'\"\n            onmouseout=\"this.style.transform='scale(1)'\"><\u002Fbutton>\n        `).join('')}\n      <\u002Fdiv>\n    <\u002Flabel>\n    <label style=\"display:block;margin-bottom:.75rem\">\n      <span style=\"color:#8a9690;font-size:.75rem;display:block;margin-bottom:4px\">Tamaño de texto: <span id=\"fs-val\">${tweakState.fontSize}px<\u002Fspan><\u002Fspan>\n      <input type=\"range\" min=\"13\" max=\"18\" step=\"1\" value=\"${tweakState.fontSize}\"\n        oninput=\"setFontSize(+this.value)\"\n        style=\"width:100%;accent-color:var(--accent)\">\n    <\u002Flabel>\n  `;\n  document.body.appendChild(panel);\n\n  window.setAccent = function(v) {\n    tweakState.accentColor = v;\n    applyTweaks(tweakState);\n    window.parent.postMessage({ type: '__edit_mode_set_keys', edits: { accentColor: v } }, '*');\n  };\n  window.setFontSize = function(v) {\n    tweakState.fontSize = v;\n    document.getElementById('fs-val').textContent = v + 'px';\n    applyTweaks(tweakState);\n    window.parent.postMessage({ type: '__edit_mode_set_keys', edits: { fontSize: v } }, '*');\n  };\n\n  window.addEventListener('message', e => {\n    if (e.data?.type === '__activate_edit_mode') panel.style.display = 'block';\n    if (e.data?.type === '__deactivate_edit_mode') panel.style.display = 'none';\n  });\n  window.parent.postMessage({ type: '__edit_mode_available' }, '*');\n\n  // ─── NAV ACTIVE STATE ───\n  const sections = document.querySelectorAll('section[id]');\n  const navLinks = document.querySelectorAll('.nav-links a');\n  const observer = new IntersectionObserver(entries => {\n    entries.forEach(e => {\n      if (e.isIntersecting) {\n        navLinks.forEach(l => l.style.color = '');\n        const active = document.querySelector(`.nav-links a[href=\"#${e.target.id}\"]`);\n        if (active) active.style.color = 'var(--accent)';\n      }\n    });\n  }, { rootMargin: '-40% 0px -55% 0px' });\n  sections.forEach(s => observer.observe(s));\n\n  // ─── ENTRANCE ANIMATIONS ───\n  const fadeEls = document.querySelectorAll('.timeline-item, .edu-card, .project-card, .skill-group, .about-bio, .detail-card');\n  fadeEls.forEach(el => {\n    el.style.opacity = '0';\n    el.style.transform = 'translateY(16px)';\n    el.style.transition = 'opacity 0.5s ease, transform 0.5s ease';\n  });\n  const fadeObserver = new IntersectionObserver(entries => {\n    entries.forEach((e, i) => {\n      if (e.isIntersecting) {\n        setTimeout(() => {\n          e.target.style.opacity = '1';\n          e.target.style.transform = 'translateY(0)';\n        }, 60 * (Array.from(fadeEls).indexOf(e.target) % 5));\n        fadeObserver.unobserve(e.target);\n      }\n    });\n  }, { threshold: 0.1 });\n  fadeEls.forEach(el => fadeObserver.observe(el));\n<\u002Fscript>\n\n\n<\u002Fbody><\u002Fhtml>"
  </script>
